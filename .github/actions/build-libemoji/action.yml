name: Build libemoji

runs:
  using: composite
  steps:
    - name: Install OS dependencies
      uses: ./.github/actions/install-os-dependencies
    - name: Show CMake version
      run: cmake --version
      shell: bash
    - name: Show Python version
      run: python --version
      shell: bash
    - name: Build libemoji
      run: |
        cd externals/libemoji
        cmake .
        cmake --build .
        ls -h lib
      shell: bash

