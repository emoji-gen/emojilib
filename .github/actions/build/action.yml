name: Prebuild

inputs:
  python-version:
    description: 'Python version'
    required: true
  artifact-name:
    description: 'Artifact name for libemoji.a'
    required: true

# outputs:
#   artifact-name:
#     description: "Artifact name of the built libemoji.a"
#     value: "${RUNNER_OS}_libemoji.a"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Build artifact name
      id: build-artifact-name
      run: |
        artifact_name=$(echo '${{ inputs.artifact-name }}' | envsubst '$RUNNER_OS')
        echo "$artifact_name"
        echo "value=$artifact_name" >> $GITHUB_OUTPUT
      shell: bash
    - name: Download libemoji.a
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ steps.build-artifact-name.outputs.value }}
        path: externals/libemoji/lib
    - name: Check artifact
      run: |
        ls -h lib
        file lib/libemoji.a
      shell: bash
    - uses: ./.github/actions/install-os-dependencies
    - uses: ./.github/actions/install-python-dependencies
    - uses: ./.github/actions/build-emojilib
      id: build-emojilib
    - name: Show wheel details
      run: |
        echo ${{ steps.build-emojilib.outputs.wheel-path }}
        echo ${{ steps.build-emojilib.outputs.wheel-filename }}
      shell: bash
    - name: Upload wheel
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.build-emojilib.outputs.wheel-filename }}
        path: ${{ steps.build-emojilib.outputs.wheel-path }}
