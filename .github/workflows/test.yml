name: Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:

jobs:
  supported-python-versions:
    runs-on: ubuntu-latest
    name: Collect supported Python versions
    outputs:
      value: ${{ steps.run-script.outputs.python-versions }}
    steps:
      - uses: actions/checkout@v5
      - name: Collect supported Python versions
        id: run-script
        uses: ./.github/actions/collect-supported-python-versions
  prebuild:
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    name: Prebuild (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install OS dependencies
        uses: ./.github/actions/install-os-dependencies
      - name: Build libemoji
        uses: ./.github/actions/build-libemoji
      - name: Upload libemoji.a
        uses: actions/upload-artifact@v7
        with:
          name: "${{ matrix.os }}_libemoji.a"
          path: externals/libemoji/lib/libemoji.a
  build:
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
        python-version: ${{ fromJson(needs.supported-python-versions.outputs.value) }}
    needs: [ prebuild, supported-python-versions ]
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }}, py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Download libemoji.a
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: "${{ matrix.os }}_libemoji.a"
          path: externals/libemoji/lib
      - name: Check artifact
        run: |
          ls -h lib
          file lib/libemoji.a
      - name: Install OS dependencies
        uses: ./.github/actions/install-os-dependencies
      - name: Install Python dependencies
        uses: ./.github/actions/install-python-dependencies
      - name: Build emojilib
        id: build-emojilib
        uses: ./.github/actions/build-emojilib
      - name: Show wheel details
        run: |
          echo ${{ steps.build-emojilib.outputs.wheel-path }}
          echo ${{ steps.build-emojilib.outputs.wheel-filename }}
      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build-emojilib.outputs.wheel-filename }}
          path: ${{ steps.build-emojilib.outputs.wheel-path }}
